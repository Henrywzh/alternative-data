name: Artificial Analysis Daily

on:
  schedule:
    - cron: "20 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  artificial-analysis:
    runs-on: ubuntu-latest
    env:
      ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Artificial Analysis daily update
        run: |
          # daily-update fetches the API and capex sources once; running validate
          # immediately before it doubles live API usage and can trigger 429s.
          python -m artificial_analysis_data.cli --base-dir . daily-update

      - name: Commit normalized datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized/artificial_analysis

          if git diff --staged --quiet; then
            echo "No Artificial Analysis normalized dataset changes to commit"
            exit 0
          fi

          git diff --cached --stat
          git commit -m "chore: update Artificial Analysis datasets"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push

      - name: Upload raw snapshots
        uses: actions/upload-artifact@v4
        with:
          name: artificial-analysis-raw-snapshots
          path: data/raw/artificial_analysis/
          if-no-files-found: error

      - name: Upload normalized datasets
        uses: actions/upload-artifact@v4
        with:
          name: artificial-analysis-normalized-datasets
          path: data/normalized/artificial_analysis/
          if-no-files-found: error
