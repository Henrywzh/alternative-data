# Scrapes OpenRouter model catalog only. AWS Spot + Lambda Cloud sources were removed.
name: Compute Availability Daily

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compute-availability:
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run daily update
        run: |
          python -m compute_availability_data.cli --base-dir . daily-update

      - name: Commit normalized datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized/compute_availability data/raw/compute_availability
          
          if git diff --staged --quiet; then
            echo "No compute availability dataset changes to commit"
            exit 0
          fi

          git diff --cached --stat
          git commit -m "chore: update compute availability datasets"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compute-availability-data
          path: |
            data/raw/compute_availability/
            data/normalized/compute_availability/
          if-no-files-found: error
