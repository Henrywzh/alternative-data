name: GitHub Trending Daily

on:
  schedule:
    - cron: "0 8 * * *" # Runs daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run trending data extraction
        run: |
          python -m src.github_trending_data.cli --period all --data-dir data

      - name: Commit normalized datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add track untracked/new files as well by adding them before checking
          git add data/normalized/github_trending || true
          
          if git diff --staged --quiet; then
            echo "No normalized dataset changes to commit"
            exit 0
          fi

          git commit -m "chore: update normalized GitHub Trending datasets"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push

      - name: Upload normalized datasets
        uses: actions/upload-artifact@v4
        with:
          name: github-trending-datasets
          path: data/normalized/github_trending/
          if-no-files-found: error
