name: LLM Benchmarks Weekly

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  llm-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Refresh ZeroEval benchmark dataset
        run: |
          python -m llm_benchmark_data.cli --base-dir . update

      - name: Rebuild frontier registry mart
        run: |
          python -m research_data.cli --base-dir . build-mart frontier_model_registry --refresh

      - name: Commit benchmark and mart datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/normalized/llm_benchmarks \
            data/normalized/marts/frontier_model_registry.csv \
            data/normalized/marts/frontier_model_registry.parquet

          if git diff --staged --quiet; then
            echo "No benchmark or frontier mart changes to commit"
            exit 0
          fi

          git diff --cached --stat
          git commit -m "chore: update llm benchmarks and frontier registry"
          git push

      - name: Upload raw benchmark snapshots
        uses: actions/upload-artifact@v4
        with:
          name: llm-benchmark-raw-snapshots
          path: data/raw/llm_benchmarks/
          if-no-files-found: error

      - name: Upload normalized benchmark datasets
        uses: actions/upload-artifact@v4
        with:
          name: llm-benchmark-normalized-datasets
          path: data/normalized/llm_benchmarks/
          if-no-files-found: error

      - name: Upload frontier mart datasets
        uses: actions/upload-artifact@v4
        with:
          name: frontier-registry-mart
          path: |
            data/normalized/marts/frontier_model_registry.csv
            data/normalized/marts/frontier_model_registry.parquet
          if-no-files-found: error
