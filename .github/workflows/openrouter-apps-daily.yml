name: OpenRouter Apps Daily

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m playwright install --with-deps chromium

      - name: Validate extractor against live source
        run: |
          python -m openrouter_data.cli --base-dir . apps-validate

      - name: Run daily apps update
        run: |
          python -m openrouter_data.cli --base-dir . apps-daily-update

      - name: Commit normalized datasets
        run: |
          if git diff --quiet -- data/normalized/openrouter; then
            echo "No normalized dataset changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized/openrouter
          git commit -m "chore: update normalized OpenRouter app datasets"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push

      - name: Upload raw snapshots
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-app-raw-snapshots
          path: data/raw/openrouter/
          if-no-files-found: error

      - name: Upload normalized datasets
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-app-normalized-datasets
          path: data/normalized/openrouter/
          if-no-files-found: error
