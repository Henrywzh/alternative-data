name: OpenRouter Provider Activity Daily

on:
  schedule:
    - cron: "30 1 * * *"   # 01:30 UTC — after rankings weekly runs
  workflow_dispatch:        # allow manual trigger for backfill

permissions:
  contents: write

jobs:
  scrape-provider-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run provider activity daily update
        run: |
          python -m openrouter_data.cli --base-dir . provider-activity-daily-update

      - name: Commit normalized datasets
        run: |
          if git diff --quiet -- data/normalized/openrouter/provider_daily_activity.csv data/normalized/openrouter/provider_daily_activity.parquet; then
            echo "No provider activity changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized/openrouter/provider_daily_activity.csv data/normalized/openrouter/provider_daily_activity.parquet
          git commit -m "chore: update provider daily activity data [$(date -u +%Y-%m-%d)]"
          git pull --rebase origin "${{ github.event.repository.default_branch }}"
          git push

      - name: Upload normalized datasets
        uses: actions/upload-artifact@v4
        with:
          name: provider-daily-activity
          path: data/normalized/openrouter/provider_daily_activity.*
          if-no-files-found: warn
