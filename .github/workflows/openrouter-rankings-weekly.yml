name: OpenRouter Rankings Weekly

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape-rankings:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate extractor against live source
        run: |
          python -m openrouter_data.cli --base-dir . validate

      - name: Run weekly update
        run: |
          python -m openrouter_data.cli --base-dir . weekly-update

      - name: Upload raw snapshots
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-raw-snapshots
          path: data/raw/openrouter/
          if-no-files-found: error

      - name: Upload normalized datasets
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-normalized-datasets
          path: data/normalized/openrouter/
          if-no-files-found: error
