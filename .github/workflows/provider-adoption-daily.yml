name: Provider Adoption Daily

on:
  schedule:
    - cron: "37 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  provider-adoption:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.PROVIDER_ADOPTION_GITHUB_TOKEN != '' && secrets.PROVIDER_ADOPTION_GITHUB_TOKEN || github.token }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set target date
        run: |
          echo "TARGET_DATE=$(date -u -d 'yesterday' +%F)" >> "$GITHUB_ENV"

      - name: Run PyPI update
        run: |
          python -m provider_adoption_data.cli --base-dir . pypi-daily-update

      - name: Run npm update
        run: |
          python -m provider_adoption_data.cli --base-dir . --date "$TARGET_DATE" npm-daily-update

      - name: Run GitHub update
        run: |
          python -m provider_adoption_data.cli --base-dir . --date "$TARGET_DATE" github-daily-update

      - name: Run derived metrics update
        run: |
          python -m provider_adoption_data.cli --base-dir . --date "$TARGET_DATE" derived-daily-update

      - name: Commit normalized datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/normalized/provider_adoption data/raw/provider_adoption
          
          if git diff --staged --quiet; then
            echo "No provider adoption dataset changes to commit"
            exit 0
          fi

          git diff --cached --stat
          git commit -m "chore: update provider adoption datasets"
          git push

      - name: Upload raw snapshots
        uses: actions/upload-artifact@v4
        with:
          name: provider-adoption-raw-snapshots
          path: data/raw/provider_adoption/
          if-no-files-found: error

      - name: Upload normalized datasets
        uses: actions/upload-artifact@v4
        with:
          name: provider-adoption-normalized-datasets
          path: data/normalized/provider_adoption/
          if-no-files-found: error
