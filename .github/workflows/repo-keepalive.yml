name: Repo Keepalive

on:
  schedule:
    - cron: "17 8 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update keepalive heartbeat
        run: |
          mkdir -p .github/keepalive
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive/heartbeat.txt

      - name: Commit heartbeat if changed
        run: |
          if git diff --quiet -- .github/keepalive/heartbeat.txt; then
            echo "No keepalive change to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive/heartbeat.txt
          git commit -m "chore: keep repo active"
          git push
